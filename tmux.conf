# ============================================================
# TMUX STARTER CONFIG
# Place this file at: ~/.tmux.conf
# After saving, reload with: tmux source-file ~/.tmux.conf
# ============================================================

# ── BETTER PREFIX KEY ─────────────────────────────────────
# Default is Ctrl-b which is awkward. Ctrl-a is closer to home row.
# (You can keep Ctrl-b if you prefer — just remove these two lines)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── SENSIBLE DEFAULTS ─────────────────────────────────────
set -g mouse on                    # scroll and click with mouse
set -g base-index 1                # windows start at 1, not 0
set -g pane-base-index 1           # panes start at 1 too
set -g renumber-windows on         # renumber when a window is closed
set -g history-limit 50000         # lots of scrollback
set -g escape-time 0               # no delay after pressing Esc (important for Neovim!)
set -g focus-events on             # let Neovim know when it gains/loses focus
set -g default-terminal "screen-256color"  # proper colors
set -sa terminal-overrides ",xterm*:Tc"    # true color support for Neovim

# ── EASY SPLITS ───────────────────────────────────────────
# | for vertical split, - for horizontal split (easier to remember)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in the same directory
bind c new-window -c "#{pane_current_path}"

# ── VIM-STYLE PANE NAVIGATION ─────────────────────────────
# Move between panes with Ctrl-h/j/k/l (same as Neovim splits)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── EASY SESSION SWITCHING ────────────────────────────────
# prefix + s already shows sessions, but let's add a shortcut
# to create new sessions quickly
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# ── STATUS BAR ────────────────────────────────────────────
# Clean, minimal status bar
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6adc8] %H:%M "
set -g status-left-length 30

# Window tabs in status bar
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# ── COPY MODE (vim style) ────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ── QUICK RELOAD ──────────────────────────────────────────
# prefix + r to reload this config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
