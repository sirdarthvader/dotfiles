# ============================================================
# TMUX CONFIG — HACKER EDITION
# To apply: tmux kill-server && tmux new-session -s work
# ============================================================

# Prefix key: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Windows start at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Scrollback
set -g history-limit 50000

# No delay after Esc (important for Neovim)
set -g escape-time 0

# Let Neovim detect focus changes
set -g focus-events on

# Colors
set -g default-terminal "screen-256color"
set -sa terminal-overrides ",xterm*:Tc"


# New session starts in home directory
bind C-a c new-session -c ~

# New windows/splits open in same directory
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ── PANE NAVIGATION ───────────────────────────────────────
# Ctrl-a then h/j/k/l to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl-a then arrow keys also works (default behavior)
# Resize panes: Ctrl-a then H/J/K/L
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Copy mode with vim keys
setw -g mode-keys vi

# Reload config
bind r source-file ~/.tmux.conf \; display "[ config reloaded ]"

# ── STATUS BAR — HACKER THEME ─────────────────────────────
set -g status-position bottom
set -g status-interval 1

# Black background, green text — classic terminal aesthetic
set -g status-style "bg=#0a0a0a,fg=#00ff41"

# Left: session name with matrix green
set -g status-left "#[fg=#0a0a0a,bg=#00ff41,bold] ⟫ #S #[fg=#00ff41,bg=#0a0a0a] "
set -g status-left-length 30

# Right: system info — uptime, pane count, date, clock with seconds
set -g status-right "#[fg=#0b3d0b]─── #[fg=#00aa00]↑#{window_panes}p #[fg=#0b3d0b]│ #[fg=#00aa00]w#{window_index}/#{session_windows} #[fg=#0b3d0b]│ #[fg=#00cc00]%d-%b-%y #[fg=#0b3d0b]│ #[fg=#00ff41,bold]%H:%M:%S "
set -g status-right-length 60

# Inactive windows: dim green
set -g window-status-format "#[fg=#0b3d0b] #I:#W "

# Active window: bright green, bold
set -g window-status-current-format "#[fg=#0a0a0a,bg=#00ff41,bold] #I:#W #[fg=#00ff41,bg=#0a0a0a]"

# Window separator
set -g window-status-separator ""

# Pane borders: dark green inactive, bright green active
set -g pane-border-style "fg=#0b3d0b"
set -g pane-active-border-style "fg=#00ff41"

# Messages
set -g message-style "bg=#00ff41,fg=#0a0a0a,bold"

# Command prompt
set -g message-command-style "bg=#0a0a0a,fg=#00ff41"

# Copy mode highlight
setw -g mode-style "bg=#00ff41,fg=#0a0a0a"

# Clock (Ctrl-a t to show)
set -g clock-mode-colour "#00ff41"
set -g clock-mode-style 24
